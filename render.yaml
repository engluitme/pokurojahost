services:
  # Backend API Service + Frontend
  - type: web
    name: pokuroja-backend
    runtime: node
    buildCommand: cd pokurojahouses-main/backend && npm install
    startCommand: node backend/backend/server.js
    workingDirectory: pokurojahouses-main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
