<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blog Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background-color: #f5f7fa; color: #333; }
    
    /* Admin Container with Sidebar */
    .admin-container { display: flex; min-height: 100vh; }
    
    /* Sidebar - Same as addproperty.html */
    .sidebar { width: 260px; background: linear-gradient(180deg, #2c3e50 0%, #1a2530 100%); color: white; padding: 25px 0; flex-shrink: 0; }
    .sidebar-brand { padding: 0 25px 30px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar-brand h2 { font-size: 20px; font-weight: 600; color: white; }
    .sidebar-nav { padding: 20px 0; }
    .nav-link { display: block; padding: 14px 25px; color: rgba(255,255,255,0.8); text-decoration: none; font-size: 15px; transition: all 0.3s; border-left: 4px solid transparent; }
    .nav-link:hover { background: rgba(255,255,255,0.05); color: white; }
    .nav-link.active { background: rgba(255,255,255,0.08); color: white; border-left-color: #3498db; }
    
    /* Main Content */
    .main-content { flex: 1; display: flex; flex-direction: column; overflow: auto; }
    .header { background: white; padding: 20px 30px; border-bottom: 1px solid #e1e5eb; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 24px; font-weight: 600; color: #2c3e50; }
    .user-info { background: #f8f9fa; padding: 8px 16px; border-radius: 6px; border: 1px solid #e1e5eb; font-size: 14px; display: flex; gap: 10px; align-items: center; }
    .content { flex: 1; padding: 30px; background-color: #f5f7fa; }
    
    /* Card Styles */
    .card { background: white; border-radius: 10px; padding: 24px; box-shadow: 0 5px 18px rgba(0,0,0,.06); margin-bottom: 20px; }
    .btn { border: none; border-radius: 6px; padding: 8px 14px; cursor: pointer; color: #fff; background: #3498db; font-size: 14px; transition: all 0.3s; }
    .btn:hover { background: #2980b9; transform: translateY(-1px); }
    .btn-danger { background: #dc3545; }
    .btn-danger:hover { background: #c82333; }
    .btn-secondary { background: #6c757d; }
    .btn-secondary:hover { background: #5a6268; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    
    /* Form Styles */
    .form-grid { display: grid; gap: 15px; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); margin-bottom: 15px; }
    input, textarea, select { width: 100%; padding: 10px 12px; border: 2px solid #e1e5eb; border-radius: 6px; font-size: 14px; transition: all 0.3s; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,0.1); }
    textarea { resize: vertical; min-height: 150px; }
    label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 13px; color: #495057; }
    
    /* Image Upload Styles */
    .image-upload-section { grid-column: 1 / -1; margin-bottom: 25px; }
    .image-upload-section label { display: block; margin-bottom: 10px; font-weight: 600; color: #2c3e50; }
    .image-preview { margin-top: 10px; max-width: 200px; max-height: 150px; border-radius: 6px; border: 1px solid #e1e5eb; display: none; object-fit: cover; }
    .upload-btn { background: #6c757d; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-right: 10px; }
    .upload-btn:hover { background: #5a6268; }
    .upload-status { margin-top: 8px; font-size: 14px; color: #6c757d; }
    .upload-status.success { color: #28a745; }
    .upload-status.error { color: #dc3545; }
    
    /* Table Styles */
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; border-bottom: 1px solid #e6ebf0; text-align: left; }
    th { background: #f8f9fa; font-weight: 600; color: #495057; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
    tr:hover { background: #f8f9fa; }
    
    /* Status Badges */
    .status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; }
    .status-published { background: #d4edda; color: #155724; }
    .status-draft { background: #ffeeba; color: #856404; }
    
    /* Message */
    .message { padding: 12px 16px; margin-bottom: 20px; border-radius: 6px; display: none; font-weight: 500; }
    .message.success { background: #28a745; color: white; }
    .message.error { background: #dc3545; color: white; }
    
    /* Action Buttons */
    .action-buttons { display: flex; gap: 8px; }
    
    h3 { color: #2c3e50; margin-bottom: 20px; font-size: 20px; }
    
    @media (max-width: 768px) {
      .admin-container { flex-direction: column; }
      .sidebar { width: 100%; padding: 15px 0; }
      .sidebar-nav { display: flex; overflow-x: auto; padding: 0; }
      .nav-link { border-left: none; border-bottom: 4px solid transparent; white-space: nowrap; }
      .nav-link.active { border-left: none; border-bottom-color: #3498db; }
      .content { padding: 20px; }
      .header { flex-direction: column; align-items: flex-start; gap: 15px; }
      .form-grid { grid-template-columns: 1fr; }
      table { display: block; overflow-x: auto; }
      .action-buttons { flex-direction: column; gap: 5px; }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>PokuRoja Admin</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="Dashboard.html" class="nav-link">Dashboard</a>
        <a href="properties.html" class="nav-link">Properties</a>
        <a href="addproperty.html" class="nav-link">Add Property</a>
        <a href="landlorddetails.html" class="nav-link">Landlord Details</a>
        <a href="blog.html" class="nav-link active">Blog</a>
        <a href="login.html" class="nav-link">Logout</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="header">
        <h1>📝 Blog Post Management</h1>
        <div class="user-info">
          <span id="userEmail">admin@pokuroja.com</span>
        </div>
      </header>

      <div class="content">
        <div id="message" class="message"></div>

        <div class="card">
          <h3 id="formTitle">Add New Blog Post</h3>
          <form id="blogForm">
            <div class="form-grid">
              <div>
                <label>Title *</label>
                <input id="blogTitle" placeholder="Enter blog title" required />
              </div>
              <div>
                <label>Author</label>
                <input id="blogAuthor" placeholder="Author name" value="Admin" />
              </div>
              <div>
                <label>Status</label>
                <select id="blogStatus">
                  <option value="published">Published</option>
                  <option value="draft">Draft</option>
                </select>
              </div>
              <div>
                <label>Excerpt (Short summary)</label>
                <input id="blogExcerpt" placeholder="Brief description of the post..." />
              </div>
            </div>
            
            <!-- Image Upload Section -->
            <div class="image-upload-section">
              <label>Cover Image</label>
              <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                <input type="file" id="blogImageFile" accept="image/*" style="display: none;" />
                <button type="button" class="upload-btn" onclick="document.getElementById('blogImageFile').click()">Choose Image</button>
                <span id="fileName">No file selected</span>
              </div>
              <img id="imagePreview" class="image-preview" alt="Preview" />
              <div id="uploadStatus" class="upload-status">Ready to upload image</div>
              <input type="hidden" id="blogCoverImage" />
            </div>
            
            <div>
              <label>Content *</label>
              <textarea id="blogContent" rows="8" placeholder="Write your blog content here..." required></textarea>
            </div>
            <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
              <button type="submit" class="btn" id="saveBtn">Save Post</button>
              <button type="button" class="btn btn-secondary" id="cancelEditBtn" style="display:none;">Cancel Edit</button>
            </div>
          </form>
        </div>

        <div class="card">
          <h3>📄 Existing Blog Posts</h3>
          <div style="overflow-x: auto;">
            <table>
              <thead>
                <tr>
                  <th>Title</th>
                  <th>Author</th>
                  <th>Date</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="blogTableBody">
                <tr><td colspan="5" style="text-align:center;">Loading blog posts...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    const token = localStorage.getItem('token');
    
    if (!token) {
      alert('Please log in as admin first.');
      window.location.href = 'login.html';
    }

    const blogForm = document.getElementById('blogForm');
    const blogTableBody = document.getElementById('blogTableBody');
    const message = document.getElementById('message');
    const formTitle = document.getElementById('formTitle');
    const cancelEditBtn = document.getElementById('cancelEditBtn');

    let editingId = null;

    // Image Upload Handler
    document.getElementById('blogImageFile').addEventListener('change', async (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const fileName = document.getElementById('fileName');
      const uploadStatus = document.getElementById('uploadStatus');
      const imagePreview = document.getElementById('imagePreview');
      const coverImageInput = document.getElementById('blogCoverImage');

      fileName.textContent = file.name;
      uploadStatus.textContent = 'Uploading...';
      uploadStatus.className = 'upload-status';

      try {
        const formData = new FormData();
        formData.append('image', file);

        const response = await fetch(`${API_BASE}/upload`, {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token
          },
          body: formData
        });

        if (!response.ok) {
          throw new Error('Upload failed');
        }

        const data = await response.json();
        coverImageInput.value = data.url;
        imagePreview.src = data.url;
        imagePreview.style.display = 'block';
        uploadStatus.textContent = '✅ Image uploaded successfully!';
        uploadStatus.className = 'upload-status success';

      } catch (error) {
        console.error('Upload error:', error);
        uploadStatus.textContent = '❌ Upload failed: ' + error.message;
        uploadStatus.className = 'upload-status error';
        fileName.textContent = 'No file selected';
      }
    });

    function showMessage(text, type = 'success') {
      message.textContent = text;
      message.className = `message ${type}`;
      message.style.display = 'block';
      setTimeout(() => message.style.display = 'none', 3500);
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function fetchBlogs() {
      blogTableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Loading blog posts...</td></tr>'; 
      try {
        const res = await fetch(`${API_BASE}/blogs`);
        const blogs = await res.json();
        
        if (!Array.isArray(blogs) || !blogs.length) {
          blogTableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No blog posts yet. Create your first post above!</td></tr>';
          return;
        }

        blogTableBody.innerHTML = blogs.map(blog => {
          const d = new Date(blog.created_at).toLocaleDateString();
          const status = blog.status || 'published';
          return `
            <tr>
              <td><strong>${escapeHtml(blog.title)}</strong></td>
              <td>${escapeHtml(blog.author || 'Admin')}</td>
              <td>${d}</td>
              <td><span class="status ${status === 'published' ? 'status-published' : 'status-draft'}">${status}</span></td>
              <td class="action-buttons">
                <button class="btn btn-secondary btn-sm" onclick="editBlog('${blog.id}')">Edit</button>
                <button class="btn btn-danger btn-sm" onclick="deleteBlog('${blog.id}')">Delete</button>
              </td>
            </tr>
          `;
        }).join('');
      } catch (err) {
        blogTableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:#dc3545;">Error loading blogs. Please refresh.</td></tr>';
        console.error(err);
      }
    }

    async function saveBlog(event) {
      event.preventDefault();
      const payload = {
        title: document.getElementById('blogTitle').value.trim(),
        content: document.getElementById('blogContent').value.trim(),
        author: document.getElementById('blogAuthor').value.trim() || 'Admin',
        excerpt: document.getElementById('blogExcerpt').value.trim(),
        coverImage: document.getElementById('blogCoverImage').value.trim(),
        status: document.getElementById('blogStatus').value
      };

      if (!payload.title || !payload.content) {
        showMessage('Title and content are required.', 'error');
        return;
      }

      try {
        const url = editingId ? `${API_BASE}/blogs/${editingId}` : `${API_BASE}/blogs`;
        const method = editingId ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method,
          headers: { 
            'Content-Type': 'application/json', 
            'Authorization': 'Bearer ' + token 
          },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error('Failed to save blog');

        showMessage(editingId ? 'Blog updated successfully!' : 'Blog created successfully!');
        blogForm.reset();
        editingId = null;
        cancelEditBtn.style.display = 'none';
        formTitle.textContent = 'Add New Blog Post';
        
        // Reset image upload fields
        document.getElementById('blogImageFile').value = '';
        document.getElementById('fileName').textContent = 'No file selected';
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('uploadStatus').textContent = 'Ready to upload image';
        document.getElementById('uploadStatus').className = 'upload-status';
        
        fetchBlogs();
      } catch (err) {
        console.error(err);
        showMessage('Unable to save blog. Please try again.', 'error');
      }
    }

    window.editBlog = async function(id) {
      try {
        const res = await fetch(`${API_BASE}/blogs/${id}`);
        if (!res.ok) throw new Error('Not found');
        const blog = await res.json();
        
        document.getElementById('blogTitle').value = blog.title;
        document.getElementById('blogContent').value = blog.content;
        document.getElementById('blogAuthor').value = blog.author || 'Admin';
        document.getElementById('blogExcerpt').value = blog.excerpt || '';
        document.getElementById('blogCoverImage').value = blog.coverImage || '';
        document.getElementById('blogStatus').value = blog.status || 'published';
        
        // Handle image preview
        const imagePreview = document.getElementById('imagePreview');
        const fileName = document.getElementById('fileName');
        const uploadStatus = document.getElementById('uploadStatus');
        
        if (blog.coverImage) {
          imagePreview.src = blog.coverImage;
          imagePreview.style.display = 'block';
          fileName.textContent = 'Current image loaded';
          uploadStatus.textContent = 'Current image loaded';
          uploadStatus.className = 'upload-status success';
        } else {
          imagePreview.style.display = 'none';
          fileName.textContent = 'No file selected';
          uploadStatus.textContent = 'Ready to upload image';
          uploadStatus.className = 'upload-status';
        }
        
        editingId = id;
        formTitle.textContent = '✏️ Edit Blog Post';
        cancelEditBtn.style.display = 'inline-block';
        
        document.querySelector('.card').scrollIntoView({ behavior: 'smooth' });
      } catch (err) {
        showMessage('Failed to load blog for edit.', 'error');
      }
    };

    window.deleteBlog = async function(id) {
      if (!confirm('Are you sure you want to delete this blog post? This action cannot be undone.')) return;
      
      try {
        const res = await fetch(`${API_BASE}/blogs/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        
        if (!res.ok) throw new Error('Delete failed');
        
        showMessage('Blog post deleted successfully.');
        fetchBlogs();
      } catch (err) {
        showMessage('Unable to delete blog post', 'error');
      }
    };

    cancelEditBtn.addEventListener('click', () => {
      blogForm.reset();
      editingId = null;
      formTitle.textContent = 'Add New Blog Post';
      cancelEditBtn.style.display = 'none';
      
      // Reset image upload fields
      document.getElementById('blogImageFile').value = '';
      document.getElementById('fileName').textContent = 'No file selected';
      document.getElementById('imagePreview').style.display = 'none';
      document.getElementById('uploadStatus').textContent = 'Ready to upload image';
      document.getElementById('uploadStatus').className = 'upload-status';
      
      showMessage('Edit cancelled', 'success');
    });

    blogForm.addEventListener('submit', saveBlog);
    fetchBlogs();
  </script>
</body>
</html>
