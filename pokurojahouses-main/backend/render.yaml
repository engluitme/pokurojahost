services:
  # Backend API Service
  - type: web
    name: pokuroja-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

  # Frontend Static Site
  - type: web
    name: pokuroja-frontend
    runtime: static
    buildCommand: echo "No build needed for static HTML"
    staticPublishPath: ./
    routes:
      - type: redirect
        source: /admin
        destination: /admin/login.html
      - type: rewrite
        source: /.*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production</content>
